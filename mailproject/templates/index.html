<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mail Sender</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg">

        <h1 class="text-3xl font-bold text-center mb-6 text-blue-600">

            Send Email

        </h1>

        {% if success %}

            <div class="bg-green-100 text-green-700 p-3 rounded mb-4">

                Email Sent Successfully

            </div>

        {% endif %}

        <form method="POST" class="space-y-4">

            {% csrf_token %}

            <div>

                <label class="block mb-1 font-medium">

                    Subject

                </label>

                <input
                    type="text"
                    name="subject"
                    placeholder="Enter Subject"

                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">

            </div>

            <div>

                <label class="block mb-1 font-medium">

                    Message

                </label>

                <textarea
                    name="message"
                    rows="5"
                    placeholder="Enter Message"

                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>

            </div>
            <div>

               <label class="block mb-1 font-medium">

                  From Email

               </label>

               <input
                    type="email"
                     name="from_email"
                     placeholder="Enter Sender Email"

                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">

</div>
            <div>

                <label class="block mb-1 font-medium">

                    Receiver Email

                </label>

                <input
                    type="email"
                    name="to_email"
                    placeholder="Enter Receiver Email"

                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">

            </div>
             
              <div>

    <label class="block mb-1 font-medium">

        Schedule Time

    </label>

    <input
        type="datetime-local"
        name="schedule_time"

        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">

</div>   

            <button
                type="submit"

                class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition duration-300">

                Send Mail

            </button>

        </form>

    </div>

</body>
</html>
